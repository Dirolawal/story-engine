<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Story Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#0A0A0A;
  --surface:#141414;
  --surface2:#1E1E1E;
  --surface3:#282828;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --orange:#FF6B00;
  --orange-dim:rgba(255,107,0,0.15);
  --orange-glow:rgba(255,107,0,0.3);
  --cream:#F5F0E8;
  --cream2:#C8C0B0;
  --muted:#6B6B6B;
  --text:#F5F0E8;

  --hook-c:#9333EA;
  --pain-c:#EF4444;
  --relate-c:#F59E0B;
  --shift-c:#10B981;
  --value-c:#3B82F6;
  --proof-c:#06B6D4;
  --cta-c:#FF6B00;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--orange);color:#000}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}

/* ── HEADER ── */
.header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--orange);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#000;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.15em;color:var(--cream)}
.step-indicator{display:flex;align-items:center;gap:6px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--surface3);transition:all 0.3s}
.step-dot.active{background:var(--orange);box-shadow:0 0 8px var(--orange-glow)}
.step-dot.done{background:var(--surface3);border:1.5px solid var(--orange)}

/* ── MAIN ── */
.main{max-width:960px;margin:0 auto;padding:32px 16px 80px}

/* ── SECTION TITLE ── */
.section-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.1em;color:var(--cream);margin-bottom:4px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:28px;letter-spacing:0.01em}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card+.card{margin-top:12px}

/* ── NICHE GRID ── */
.niche-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:500px){.niche-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.niche-grid{grid-template-columns:repeat(4,1fr)}}
.niche-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:16px 12px;cursor:pointer;transition:all 0.18s;text-align:center}
.niche-card:hover{border-color:var(--border2);background:var(--surface3)}
.niche-card.selected{border-color:var(--orange);background:var(--orange-dim);box-shadow:0 0 0 1px var(--orange)}
.niche-icon{font-size:22px;margin-bottom:6px}
.niche-label{font-size:12px;font-weight:700;color:var(--cream);letter-spacing:0.04em}
.niche-custom{display:flex;gap:8px;margin-top:4px}

/* ── INPUTS ── */
input[type=text],textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--cream);font-family:'Space Grotesk',sans-serif;font-size:14px;padding:12px 14px;outline:none;transition:border-color 0.2s;resize:none}
input[type=text]::placeholder,textarea::placeholder{color:var(--muted)}
input[type=text]:focus,textarea:focus{border-color:var(--orange)}
textarea{min-height:120px;line-height:1.6}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:8px;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.18s;letter-spacing:0.03em}
.btn-primary{background:var(--orange);color:#000;width:100%}
.btn-primary:hover:not(:disabled){background:#FF8533;box-shadow:0 4px 20px var(--orange-glow)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--cream2);width:100%}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto}
.btn-icon{padding:8px;width:36px;height:36px;border-radius:6px}

/* ── MODE TOGGLE ── */
.mode-toggle{display:grid;grid-template-columns:1fr 1fr;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:16px}
.mode-btn{padding:11px;border:none;border-radius:7px;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:6px}
.mode-btn.active{background:var(--surface3);color:var(--cream);box-shadow:0 1px 4px rgba(0,0,0,0.5)}
.mode-btn:hover:not(.active){color:var(--cream2)}

/* ── SLIDER ── */
.slider-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.slider-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--orange);min-width:30px;text-align:right}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:3px;background:var(--surface3);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--orange);cursor:pointer;box-shadow:0 0 8px var(--orange-glow);border:2px solid var(--bg)}

/* ── IDEA CARDS ── */
.ideas-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}
@media(min-width:480px){.ideas-grid{grid-template-columns:1fr 1fr}}
.idea-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.18s}
.idea-card:hover{border-color:var(--border2)}
.idea-card.selected{border-color:var(--orange);background:var(--orange-dim)}
.idea-title{font-size:13px;font-weight:700;color:var(--cream);margin-bottom:4px}
.idea-hook{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:48px 24px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--orange);background:var(--orange-dim)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:36px;margin-bottom:12px}
.upload-title{font-size:15px;font-weight:700;color:var(--cream);margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--muted)}
.upload-preview{position:relative;border-radius:12px;overflow:hidden;margin-bottom:16px}
.upload-preview img,.upload-preview video{width:100%;max-height:240px;object-fit:cover;border-radius:12px;display:block}
.upload-change{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);border:1px solid var(--border2);color:var(--cream);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;padding:6px 10px;border-radius:6px;cursor:pointer;backdrop-filter:blur(4px)}

/* ── LOADING ── */
.loading-wrap{text-align:center;padding:60px 20px;display:none}
.loading-wrap.show{display:block}
.spinner{width:36px;height:36px;border:3px solid var(--surface3);border-top-color:var(--orange);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-size:14px;color:var(--muted)}

/* ── DESIGN STUDIO ── */
.studio-layout{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:720px){.studio-layout{grid-template-columns:200px 1fr 260px}}

/* slide list panel */
.slide-list{display:flex;flex-direction:column;gap:6px}
@media(max-width:719px){.slide-list{flex-direction:row;overflow-x:auto;padding-bottom:4px}}
.slide-thumb{flex-shrink:0;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all 0.18s;width:100%}
@media(max-width:719px){.slide-thumb{min-width:130px;width:130px}}
.slide-thumb:hover{border-color:var(--border2)}
.slide-thumb.active{border-color:var(--orange);background:var(--orange-dim)}
.thumb-type{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.thumb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.thumb-headline{font-size:11px;color:var(--cream2);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* canvas preview */
.preview-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.canvas-outer{display:flex;align-items:center;gap:0;width:100%;max-width:340px;margin:0 auto;position:relative}
.canvas-container{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);flex:1}
.canvas-container canvas{display:block;width:100%;height:auto;border-radius:12px}

/* vertical text-size slider */
.vslider-track{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:28px;flex-shrink:0;padding:8px 0;position:relative;z-index:2}
.vslider-wrap{height:180px;display:flex;align-items:center;justify-content:center;position:relative}
input[type=range].vslider{
  -webkit-appearance:none;appearance:none;
  writing-mode:vertical-lr;direction:rtl;
  width:4px;height:160px;
  background:var(--surface3);border-radius:4px;outline:none;cursor:pointer;
  transform:none;
}
input[type=range].vslider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--orange);box-shadow:0 0 8px var(--orange-glow);
  border:2px solid var(--bg);cursor:grab;
}
input[type=range].vslider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:var(--orange);border:2px solid var(--bg);cursor:grab;
}
.vslider-reset{background:none;border:none;cursor:pointer;color:var(--muted);font-size:9px;font-family:'Space Grotesk',sans-serif;font-weight:700;padding:3px;border-radius:3px;line-height:1;transition:color .15s;text-align:center;letter-spacing:.02em}
.vslider-reset:hover{color:var(--orange)}

/* draggable canvas cursor */
#previewCanvas{cursor:grab;touch-action:none}
#previewCanvas.dragging{cursor:grabbing}

/* snap guides */
.snap-guide{position:absolute;pointer-events:none;opacity:0;transition:opacity .1s;background:rgba(255,255,255,.5)}
.snap-guide.h{left:0;right:0;height:1px;top:50%}
.snap-guide.v{top:0;bottom:0;width:1px;left:50%}
.snap-guide.show{opacity:1}

/* Open in Instagram / Copy button */
.btn-ig{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;border:none}
.btn-ig:hover{opacity:.88;box-shadow:0 4px 20px rgba(253,29,29,.4)}
.btn-copy-ig{background:var(--surface2);border:1.5px solid var(--border2);color:var(--cream)}
.btn-copy-ig:hover{border-color:var(--orange);color:var(--orange)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);border:1px solid var(--border2);color:var(--cream);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;border-radius:20px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* customization panel */
.custom-panel{display:flex;flex-direction:column;gap:14px}
.custom-section-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

/* font selector */
.font-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.font-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:10px 8px;cursor:pointer;transition:all 0.18s;text-align:center;color:var(--cream2)}
.font-btn:hover{border-color:var(--border2)}
.font-btn.selected{border-color:var(--orange);background:var(--orange-dim);color:var(--orange)}
.font-btn-name{font-size:11px;font-weight:700;margin-bottom:2px}
.font-btn-preview{font-size:16px;color:var(--cream)}

/* hero word editor */
.hero-editor{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;line-height:2}
.word-token{display:inline;cursor:pointer;border-radius:3px;padding:1px 2px;transition:all 0.15s;font-size:13px;color:var(--cream2)}
.word-token:hover{background:rgba(255,107,0,0.15);color:var(--orange)}
.word-token.hero{color:var(--orange);font-weight:700;background:rgba(255,107,0,0.1)}
.hero-hint{font-size:11px;color:var(--muted);margin-top:6px}

/* size control */
.size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.size-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:8px 4px;cursor:pointer;transition:all 0.18s;text-align:center;font-size:11px;font-weight:700;color:var(--muted)}
.size-btn:hover{border-color:var(--border2);color:var(--cream)}
.size-btn.selected{border-color:var(--orange);color:var(--orange);background:var(--orange-dim)}

/* position control */
.pos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.pos-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:8px 4px;cursor:pointer;transition:all 0.18s;text-align:center;font-size:18px}
.pos-btn:hover{border-color:var(--border2)}
.pos-btn.selected{border-color:var(--orange);background:var(--orange-dim)}

/* ── EXPORT BAR ── */
.export-bar{position:sticky;bottom:16px;margin-top:24px;display:flex;gap:8px}
.export-bar .btn{flex:1}
.btn-dl{background:var(--surface2);border:1.5px solid var(--border2);color:var(--cream)}
.btn-dl:hover{border-color:var(--orange);color:var(--orange)}
.btn-dl-all{background:var(--orange);color:#000}
.btn-dl-all:hover{background:#FF8533;box-shadow:0 4px 20px var(--orange-glow)}

/* ── SLIDE TYPE COLOURS ── */
.tc-hook{color:var(--hook-c)}
.tc-pain{color:var(--pain-c)}
.tc-relate{color:var(--relate-c)}
.tc-shift{color:var(--shift-c)}
.tc-value{color:var(--value-c)}
.tc-proof{color:var(--proof-c)}
.tc-cta{color:var(--cta-c)}
.dc-hook{background:var(--hook-c)}
.dc-pain{background:var(--pain-c)}
.dc-relate{background:var(--relate-c)}
.dc-shift{background:var(--shift-c)}
.dc-value{background:var(--value-c)}
.dc-proof{background:var(--proof-c)}
.dc-cta{background:var(--cta-c)}

/* ── BACK BUTTON ── */
.back-btn{background:none;border:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0;margin-bottom:20px;transition:color 0.15s}
.back-btn:hover{color:var(--cream)}

/* ── ERROR ── */
.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:12px 14px;font-size:13px;color:#FCA5A5;display:none;margin-top:10px}
.err.show{display:block}

/* ── DIRECTION NOTE ── */
.direction-note{display:flex;align-items:flex-start;gap:6px;background:var(--surface2);border-radius:7px;padding:8px 10px;margin-top:8px}
.direction-note span{font-size:11px;color:var(--muted);font-style:italic;line-height:1.5}

/* ── PANEL ACCORDION ── */
.panel-section{border-bottom:1px solid var(--border)}
.panel-section:last-child{border-bottom:none}
.panel-section summary{list-style:none;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:11px 0;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;outline:none}
.panel-section summary::-webkit-details-marker{display:none}
.panel-section summary::after{content:'›';font-size:15px;transition:transform .2s;color:var(--muted)}
.panel-section[open] summary::after{transform:rotate(90deg)}
.panel-section-body{padding-bottom:14px;display:flex;flex-direction:column;gap:10px}

/* ── CONTROL PRIMITIVES ── */
.ctrl-label{font-size:11px;color:var(--muted)}
.ctrl-row{display:flex;align-items:center;gap:8px}
.range-wrap{display:flex;align-items:center;gap:8px;flex:1}
.range-wrap input[type=range]{flex:1}
.range-val{font-size:11px;color:var(--cream2);min-width:38px;text-align:right;white-space:nowrap}
.color-row{display:flex;align-items:center;gap:8px}
input[type=color]{width:32px;height:32px;border-radius:6px;border:1.5px solid var(--border2);background:none;cursor:pointer;padding:2px;flex-shrink:0}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:none;border-radius:3px}
.color-hex{font-size:11px;color:var(--muted);font-family:monospace;letter-spacing:.03em}
.weight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.weight-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:6px 2px;cursor:pointer;transition:all .15s;text-align:center;font-size:10px;font-weight:700;color:var(--muted)}
.weight-btn:hover{border-color:var(--border2);color:var(--cream2)}
.weight-btn.selected{border-color:var(--orange);color:var(--orange);background:var(--orange-dim)}
.align-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.align-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:8px 4px;cursor:pointer;transition:all .15s;text-align:center;font-size:11px;font-weight:600;color:var(--muted)}
.align-btn:hover{border-color:var(--border2);color:var(--cream2)}
.align-btn.selected{border-color:var(--orange);color:var(--orange);background:var(--orange-dim)}
.slide-textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--cream);font-family:'Space Grotesk',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:vertical;line-height:1.55;min-height:56px}
.slide-textarea:focus{border-color:var(--orange)}
.slide-ta-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.word-zone{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;line-height:2.3;min-height:52px}
.wtoken{display:inline;cursor:pointer;border-radius:3px;padding:1px 2px;transition:all .1s;font-size:12px;color:var(--cream2)}
.wtoken:hover{background:rgba(255,107,0,.12);color:var(--cream)}
.wtoken.w-highlighted{font-weight:700}
.wtoken.w-selected{outline:1.5px solid var(--orange);border-radius:3px;background:rgba(255,107,0,.15)}
.word-fmt{background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle-sw{position:relative;display:inline-block;width:38px;height:20px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;cursor:pointer;inset:0;background:var(--surface3);border-radius:20px;transition:.2s}
.toggle-track::before{position:absolute;content:'';height:14px;width:14px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.2s}
.toggle-sw input:checked+.toggle-track{background:var(--orange)}
.toggle-sw input:checked+.toggle-track::before{transform:translateX(18px);background:#000}

/* ── PRESETS ── */
.preset-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.preset-strip::-webkit-scrollbar{display:none}
.preset-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:5px 8px 5px 11px;font-size:11px;font-weight:600;color:var(--cream2);cursor:pointer;transition:all .15s;white-space:nowrap;max-width:160px}
.preset-chip:hover{border-color:var(--border2);color:var(--cream)}
.preset-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pchip-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}

/* ── VOICE MODAL ── */

.btn-voice-header{background:none;border:1.5px solid var(--border2);color:var(--cream2);font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;padding:6px 10px;border-radius:20px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;letter-spacing:.04em;white-space:nowrap}

/* ── WORD HIGHLIGHT PANEL ── */

.client-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:8px}
@media(min-width:480px){.client-grid{grid-template-columns:repeat(2,1fr)}}
.client-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .18s}
.client-card:hover{border-color:var(--border2);background:var(--surface3)}
.client-card.selected{border-color:var(--orange);background:var(--orange-dim);box-shadow:0 0 0 1px var(--orange)}

.client-card-niche{font-size:11px;color:var(--cream2);line-height:1.35}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">SE</div>
    <span class="logo-text">Story Engine</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="client-bar"></div>
    <button id="btn-my-voice" class="btn-voice-header" onclick="openVoiceModal()">
      <span>◈</span> <span id="voice-btn-label">My Voice</span>
    </button>
    <div class="step-indicator" id="stepIndicator">
      <div class="step-dot active" title="Niche"></div>
      <div class="step-dot" title="Story"></div>
      <div class="step-dot" title="Image"></div>
      <div class="step-dot" title="Design"></div>
    </div>
  </div>
</header>
<div id="voice-modal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeVoiceModal()"></div>

<main class="main" id="app"></main>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const S = {
  step: 1,          // 1=niche 2=story 3=image 4=design
  client: null,     // logged-in client {id, name, niche, password, ...}
  niche: '',
  nicheCustom: '',
  mode: 'inspire',
  inspireStep: 1,   // 1=topic 2=pick-angle
  inspireTopic: '',
  ideas: [],
  selectedAngle: null,
  braindumpText: '',
  topicSlug: 'story',
  selectedWord: null,
  hlColor: '#FF6B00', // active highlight colour in the word panel
  hlCaps: false,      // caps-lock toggle for word highlight
  length: 7,
  slides: [],
  bgDataURL: null,
  bgIsVideo: false,
  bgEl: null,
  activeSlide: 0,
  customizations: [],
  // Language
  language: 'English',
  originalCustomizations: null, // backup before translation
  // Voice profile
  voiceProfile: null,  // loaded from localStorage
  useVoice: false,
  // Research
  researchData: null,
  researchInformed: false,
};

// ═══════════════════════════════════════════════════════════════
// PRESETS  (localStorage-backed)
// ═══════════════════════════════════════════════════════════════
const PRESET_KEY = 'se_presets_v1';

function loadPresets() {
  try { return JSON.parse(localStorage.getItem(PRESET_KEY)||'[]'); } catch(e){ return []; }
}
function savePresets(arr) {
  localStorage.setItem(PRESET_KEY, JSON.stringify(arr));
}

// Extract the style-only portion of a customization (no text content, no wordFormats)
function customToPreset(custom) {
  const {headline, body, wordFormats, ...style} = custom;
  return style;
}

function savePreset() {
  const input = document.getElementById('preset-name-input');
  const name = (input?.value||'').trim();
  if(!name) { input?.focus(); return; }
  const presets = loadPresets();
  // Overwrite if same name
  const existing = presets.findIndex(p=>p.name===name);
  const style = customToPreset(S.customizations[S.activeSlide]);
  if(existing>=0) presets[existing] = {name, style};
  else presets.push({name, style});
  savePresets(presets);
  if(input) input.value='';
  render();
}

function applyPreset(name) {
  const preset = loadPresets().find(p=>p.name===name);
  if(!preset) return;
  Object.assign(S.customizations[S.activeSlide], preset.style);
  render();
}

function applyPresetAll(name) {
  const preset = loadPresets().find(p=>p.name===name);
  if(!preset) return;
  S.customizations.forEach(c=>Object.assign(c, preset.style));
  render();
}

function deletePreset(name) {
  savePresets(loadPresets().filter(p=>p.name!==name));
  render();
}

// ═══════════════════════════════════════════════════════════════
// VOICE PROFILE  (localStorage-backed)
// ═══════════════════════════════════════════════════════════════
const VOICE_KEY = 'se_voice_v1';

function loadVoiceProfile() {
  try { return JSON.parse(localStorage.getItem(VOICE_KEY)||'null'); } catch(e){ return null; }
}
function saveVoiceProfile(profile) {
  localStorage.setItem(VOICE_KEY, JSON.stringify(profile));
  S.voiceProfile = profile;
}
function deleteVoiceProfile() {
  localStorage.removeItem(VOICE_KEY);
  S.voiceProfile = null;
  S.useVoice = false;
}

// Boot: load persisted voice profile
S.voiceProfile = loadVoiceProfile();
if(S.voiceProfile) S.useVoice = true;

// ═══════════════════════════════════════════════════════════════
// CLIENT AUTH  (sessionStorage — clears on tab close)
// ═══════════════════════════════════════════════════════════════
const CLIENT_KEY = 'se_client_v1';
let _clientsCatalog = [];
let _loginClientId = null;

function loadStoredClient() {
  try { return JSON.parse(sessionStorage.getItem(CLIENT_KEY) || 'null'); } catch(e) { return null; }
}
function saveStoredClient(c) {
  sessionStorage.setItem(CLIENT_KEY, JSON.stringify(c));
}
function clearClient() {
  sessionStorage.removeItem(CLIENT_KEY);
  S.client = null;
  S.niche = '';
  S.step = 1;
  _updateClientHeader();
  render();
}

async function apiFetch(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (S.client) {
    headers['X-Client-Id'] = S.client.id;
    headers['X-Client-Password'] = S.client.password;
  }
  const res = await fetch(path, { ...options, headers });
  if (res.status === 401) {
    alert('Session expired or invalid credentials. Please log in again.');
    clearClient();
    throw new Error('unauthorized');
  }
  return res;
}

async function fetchClientsCatalog() {
  try {
    const r = await fetch('/api/clients');
    const j = await r.json();
    _clientsCatalog = j.clients || [];
  } catch (e) {
    _clientsCatalog = [];
  }
}

async function attemptLogin(clientId, password) {
  const r = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ client_id: clientId, password })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.error || 'Login failed');
  }
  const j = await r.json();
  const c = { ...j.client, password };
  S.client = c;
  saveStoredClient(c);
  S.niche = 'client';
  S.length = c.default_length || 8;
  S.language = c.default_language || 'English';
  S.step = 2;
  _updateClientHeader();
  render();
}

function renderLogin() {
  const opts = _clientsCatalog.map(c => `
    <div class="client-card${_loginClientId === c.id ? ' selected' : ''}" onclick="_selectLoginClient('${c.id}')" id="lc-${c.id}">
      <div class="client-card-name">${esc(c.name)}</div>
      <div class="client-card-niche">${esc(c.niche)}</div>
    </div>
  `).join('');
  return `
    <section class="card" style="max-width:560px;margin:40px auto">
      <h1 style="margin:0 0 6px;font-size:22px">Welcome</h1>
      <p class="hint" style="margin:0 0 18px">Pick a client profile, then enter the password.</p>
      <div class="client-grid">${opts || '<div class="hint" style="padding:14px">No clients configured yet.</div>'}</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px">
        <input type="password" id="login-pw" placeholder="Password" autocomplete="current-password"
               style="background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--cream);font-size:14px;outline:none"
               onkeydown="if(event.key==='Enter')_submitLogin()"/>
        <button class="btn-primary" onclick="_submitLogin()" style="margin-top:4px">Log in →</button>
        <div id="login-err" style="display:none;color:#ff7e7e;font-size:13px;margin-top:4px"></div>
      </div>
    </section>
  `;
}

function _selectLoginClient(id) {
  _loginClientId = id;
  document.querySelectorAll('.client-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('lc-' + id)?.classList.add('selected');
  document.getElementById('login-pw')?.focus();
}

async function _submitLogin() {
  const pw = document.getElementById('login-pw')?.value || '';
  const errEl = document.getElementById('login-err');
  if (!_loginClientId) { errEl.textContent = 'Pick a client first.'; errEl.style.display = 'block'; return; }
  if (!pw) { errEl.textContent = 'Enter the password.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  try {
    await attemptLogin(_loginClientId, pw);
  } catch (e) {
    errEl.textContent = e.message || 'Login failed';
    errEl.style.display = 'block';
  }
}

function _updateClientHeader() {
  const bar = document.getElementById('client-bar');
  if (!bar) return;
  if (S.client) {
    bar.style.display = 'flex';
    bar.innerHTML = `
      <span class="client-badge">${esc(S.client.name)}</span>
      <button class="btn-logout" onclick="clearClient()">Logout</button>
    `;
  } else {
    bar.style.display = 'none';
    bar.innerHTML = '';
  }
}

const LANGUAGES = [
  {code:'English',   flag:'🌐'},
  {code:'Spanish',   flag:'🇪🇸'},
  {code:'French',    flag:'🇫🇷'},
  {code:'Portuguese',flag:'🇵🇹'},
  {code:'German',    flag:'🇩🇪'},
  {code:'Italian',   flag:'🇮🇹'},
  {code:'Turkish',   flag:'🇹🇷'},
  {code:'Arabic',    flag:'🇸🇦'},
];

const NICHES = [
  {id:'content-creator', label:'Content Creator', icon:'🎥'},
  {id:'fitness-coach',   label:'Fitness Coach',   icon:'💪'},
  {id:'finance',         label:'Finance / Investing', icon:'📈'},
  {id:'real-estate',     label:'Real Estate',     icon:'🏠'},
  {id:'ecommerce',       label:'E-Commerce',      icon:'🛍️'},
  {id:'biz-coach',       label:'Business Coach',  icon:'🧠'},
  {id:'personal-brand',  label:'Personal Brand',  icon:'⭐'},
  {id:'other',           label:'Other',           icon:'✏️'},
];

const SLIDE_PLANS = {
  4:['hook','pain','value','cta'],
  5:['hook','pain','relate','value','cta'],
  6:['hook','pain','relate','shift','value','cta'],
  7:['hook','pain','relate','shift','value','proof','cta'],
  8:['hook','pain','relate','shift','value','value','proof','cta'],
  9:['hook','pain','relate','relate','shift','value','value','proof','cta'],
  10:['hook','pain','relate','relate','shift','value','value','proof','proof','cta'],
};

const TYPE_META = {
  hook:   {label:'Hook',   emoji:'🎣', c:'hook'},
  pain:   {label:'Pain',   emoji:'🔥', c:'pain'},
  relate: {label:'Relate', emoji:'🤝', c:'relate'},
  shift:  {label:'Shift',  emoji:'↗',  c:'shift'},
  value:  {label:'Value',  emoji:'💎', c:'value'},
  proof:  {label:'Proof',  emoji:'✅', c:'proof'},
  cta:    {label:'CTA',    emoji:'📲', c:'cta'},
};

const FONTS = [
  {id:'inter',    label:'Inter',    css:"'Inter', sans-serif",        preview:'Aa'},
  {id:'bebas',    label:'Bebas',    css:"'Bebas Neue', sans-serif",   preview:'Aa'},
  {id:'playfair', label:'Playfair', css:"'Playfair Display', serif",  preview:'Aa'},
  {id:'barlow',   label:'Barlow',   css:"'Barlow Condensed', sans-serif", preview:'Aa'},
  {id:'space',    label:'Grotesk',  css:"'Space Grotesk', sans-serif",preview:'Aa'},
];

const SIZES = ['S','M','L','XL'];
const SIZE_SCALE = {S:0.75, M:1, L:1.25, XL:1.55};
const POSITIONS = ['top','center','bottom'];
const POS_ICONS = {top:'⬆', center:'◉', bottom:'⬇'};

function defaultCustom(slide) {
  return {
    headline: slide?.headline || '',
    body: slide?.body || '',
    textScale: 1.0,
    dragX: null,  // null = use position preset; 0.0–1.0 = fraction of canvas W
    dragY: null,  // null = use position preset; 0.0–1.0 = fraction of canvas H
    font: 'space',
    headlineSize: 88,
    headlineWeight: 800,
    headlineColor: '#F5F0E8',
    headlineAlign: 'left',
    bodySize: 48,
    bodyWeight: 400,
    bodyColor: '#C8C0B0',
    bodyAlign: 'left',
    lineHeight: 1.2,
    wordFormats: {},
    position: 'center',
    textShadow: true,
    overlayOpacity: 0.62,
  };
}

// ═══════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (!S.client) {
    app.innerHTML = renderLogin();
    document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('done', 'active'));
    return;
  }
  // update step dots
  const dots = document.querySelectorAll('.step-dot');
  dots.forEach((d,i)=>{
    d.classList.toggle('done', i+1 < S.step);
    d.classList.toggle('active', i+1 === S.step);
  });
  if(S.step===1) app.innerHTML = renderNiche();
  else if(S.step===2) app.innerHTML = renderStory();
  else if(S.step===3) app.innerHTML = renderImage();
  else if(S.step===4) { app.innerHTML = renderDesign(); initDesign(); }
}

async function getIdeas() {
  const input = document.getElementById('inspire-topic');
  const topic = input?.value.trim()||'';
  S.inspireTopic = topic;
  if(!topic){
    const e = document.getElementById('inspire-err');
    if(e){e.textContent='Please enter a topic first.';e.classList.add('show');}
    return;
  }
  const btn = document.getElementById('btn-ideas');
  if(btn){btn.disabled=true;btn.textContent='Generating ideas…';}
  try {
    const researchContext = S.researchData?.inject || '';
    const res = await apiFetch('/api/inspire', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({topic, niche: getNicheLabel(), researchContext})
    });
    if(!res.ok) throw new Error('Request failed');
    const {ideas} = await res.json();
    S.ideas = ideas||[];
    S.researchInformed = !!researchContext;
    S.inspireStep = 2;
    S.selectedAngle = null;
    render();
  } catch(e) {
    const err = document.getElementById('inspire-err');
    if(err){err.textContent=e.message||'Error';err.classList.add('show');}
    if(btn){btn.disabled=false;btn.textContent='Get 6 Story Angles';}
  }
}
function selectIdea(i) {
  S.selectedAngle = i;
  document.querySelectorAll('.idea-card').forEach((c,idx)=>c.classList.toggle('selected',idx===i));
}

async function startGenerate(mode) {
  let input = '';
  if(mode==='inspire') {
    const custom = document.getElementById('inspire-custom')?.value.trim()||'';
    if(custom) input = custom;
    else if(S.selectedAngle!==null) input = (S.ideas[S.selectedAngle]?.title||'')+(S.ideas[S.selectedAngle]?.hook ? ' — '+S.ideas[S.selectedAngle].hook : '');
    if(!input){alert('Please select an angle or type your own.');return;}
  } else {
    input = document.getElementById('braindump-input')?.value.trim()||'';
    S.braindumpText = input;
    if(!input){
      const e=document.getElementById('braindump-err');
      if(e){e.textContent='Please add some thoughts first.';e.classList.add('show');}
      return;
    }
  }
  // Show loading
  document.querySelectorAll('.card,.mode-toggle,.btn,.back-btn').forEach(el=>el.style.display='none');
  const loading = document.getElementById('loading');
  if(loading){loading.classList.add('show');document.getElementById('loading-label').textContent = mode==='braindump'?'Transforming your thoughts…':'Writing your story…';}

  try {
    const voiceStyle = (S.useVoice && S.voiceProfile?.prompt_injection) ? S.voiceProfile.prompt_injection : '';
    const res = await apiFetch('/api/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mode, input, length: S.length, niche: getNicheLabel(), voiceStyle})
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf='', slides=null;
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        const raw=line.slice(6).trim();
        if(raw==='[DONE]') continue;
        try{
          const ev=JSON.parse(raw);
          if(ev.type==='complete') slides=ev.slides;
          if(ev.type==='error') throw new Error(ev.message);
        }catch(pe){if(pe.message&&!pe.message.includes('JSON')&&!pe.message.includes('token'))throw pe;}
      }
    }
    if(!slides||!slides.length) throw new Error('No slides returned');
    S.slides = slides;
    S.customizations = slides.map(sl=>defaultCustom(sl));
    S.originalCustomizations = null;
    S.language = 'English';
    S.activeSlide = 0;
    S.selectedWord = null;
    // Derive 1-2 word slug for file naming
    const topicText = mode==='inspire' ? input : S.braindumpText;
    S.topicSlug = (topicText||'story').toLowerCase()
      .replace(/[^a-z0-9\s]/g,'').trim()
      .split(/\s+/).slice(0,2).join('-') || 'story';
    S.step = 3;
    render();
  } catch(err) {
    alert('Error: '+(err.message||'Something went wrong'));
    S.step=2; render();
  }
}

function renderImage() {
  return `

    ${S.bgDataURL ? `

        ${S.bgIsVideo
          ? `<video src="${S.bgDataURL}" muted loop autoplay playsinline></video>`
          : `<img src="${S.bgDataURL}" alt="background"/>`}
        <button class="upload-change" onclick="clearBg()">Change</button>
      </div>
      <button class="btn btn-primary" onclick="S.step=4;render()">Continue to Design →</button>
    ` : `
      <div class="upload-zone" id="upload-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <input type="file" accept="image/*,video/*" onchange="handleFile(this.files[0])"/>
        <div class="upload-icon">📸</div>
        <div class="upload-title">Drop your photo or video here</div>
        <div class="upload-sub">JPEG, PNG, MP4, MOV — up to 50MB</div>
      </div>
      <div style="height:12px"></div>
      <button class="btn btn-ghost" onclick="skipImage()">Skip — use solid background</button>
    `}`;
}
function onDragOver(e){e.preventDefault();document.getElementById('upload-zone')?.classList.add('drag-over');}
function onDragLeave(e){document.getElementById('upload-zone')?.classList.remove('drag-over');}
function onDrop(e){e.preventDefault();const f=e.dataTransfer?.files?.[0];if(f)handleFile(f);}
function handleFile(file) {
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    S.bgDataURL=ev.target.result;
    S.bgIsVideo=file.type.startsWith('video/');
    if(S.bgIsVideo){
      const v=document.createElement('video');
      v.src=S.bgDataURL; v.crossOrigin='anonymous';
      v.addEventListener('loadeddata',()=>{S.bgEl=v;});
      v.load();
    } else {
      const img=new Image();
      img.onload=()=>{S.bgEl=img;};
      img.src=S.bgDataURL;
    }
    render();
  };
  reader.readAsDataURL(file);
}
function clearBg(){S.bgDataURL=null;S.bgEl=null;render();}
function skipImage(){S.bgDataURL=null;S.bgEl=null;S.step=4;render();}

// MOBILE DETECT + INSTAGRAM

function isMobile() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}

function showToast(msg, duration=2800) {
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), duration);
}

async function _slideBlob(idx) {
  await document.fonts.ready;
  const canvas = await renderCanvas(true, idx);
  if(!canvas) return null;
  return new Promise(res => canvas.toBlob(res, 'image/png'));
}

async function openInInstagram(idx) {
  const blob = await _slideBlob(idx);
  if(!blob) return;
  // Write image to clipboard as a fallback reference, then try deep link
  // Instagram Stories deep link requires the image to be shared via native share sheet
  if(navigator.share && navigator.canShare && navigator.canShare({files:[new File([blob],'slide.png',{type:'image/png'})]})) {
    try {
      await navigator.share({
        files: [new File([blob], `${S.topicSlug}-${idx+1}.png`, {type:'image/png'})],
        title: 'Story Slide',
      });
      return;
    } catch(e) {
      if(e.name==='AbortError') return; // user cancelled
    }
  }
  // Fallback: save + deep link
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${S.topicSlug}-${idx+1}.png`; a.click();
  setTimeout(()=>{ window.location.href = 'instagram://story-camera'; }, 800);
  showToast('Image saved — paste it into Instagram Stories');
}

async function copyForInstagram(idx) {
  const blob = await _slideBlob(idx);
  if(!blob) return;
  try {
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    showToast('Copied! Save the image and upload to Instagram Stories');
  } catch(e) {
    // Clipboard API blocked — fall back to download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`${S.topicSlug}-${idx+1}.png`; a.click();
    showToast('Image saved — upload it to Instagram Stories');
  }
}

// ═══════════════════════════════════════════════════════════════
// DRAGGABLE TEXT ON CANVAS
// ═══════════════════════════════════════════════════════════════
const SNAP_THRESH = 0.06; // fraction of canvas dimension

function initDrag() {
  const canvas = document.getElementById('previewCanvas');
  if(!canvas) return;

  let dragging = false;
  let startClientX, startClientY, startDragX, startDragY;

  function getXY(e) {
    const t = e.touches ? e.touches[0] : e;
    return {cx: t.clientX, cy: t.clientY};
  }

  function canvasFrac(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)),
      y: Math.max(0, Math.min(1, (clientY - rect.top)  / rect.height)),
    };
  }

  function onStart(e) {
    const custom = S.customizations[S.activeSlide];
    const {cx, cy} = getXY(e);
    const {x, y} = canvasFrac(cx, cy);

    // Only start drag if pointer is near the text block
    const textY = custom.dragY !== null ? custom.dragY : (custom.position==='top'?0.1 : custom.position==='bottom'?0.8 : 0.5);
    if(Math.abs(y - textY) > 0.35) return; // too far from text

    dragging = true;
    startClientX = cx; startClientY = cy;
    startDragX = custom.dragX !== null ? custom.dragX : 0.09;
    startDragY = custom.dragY !== null ? custom.dragY : textY;
    canvas.classList.add('dragging');
    e.preventDefault();
  }

  function onMove(e) {
    if(!dragging) return;
    const {cx, cy} = getXY(e);
    const rect = canvas.getBoundingClientRect();
    const dx = (cx - startClientX) / rect.width;
    const dy = (cy - startClientY) / rect.height;

    let nx = Math.max(0, Math.min(1, startDragX + dx));
    let ny = Math.max(0, Math.min(1, startDragY + dy));

    // Snap to centre
    const snapH = document.getElementById('snap-h');
    const snapV = document.getElementById('snap-v');
    const nearCX = Math.abs(nx - 0.5) < SNAP_THRESH;
    const nearCY = Math.abs(ny - 0.5) < SNAP_THRESH;
    if(nearCX) { nx = 0.5; snapV?.classList.add('show'); } else { snapV?.classList.remove('show'); }
    if(nearCY) { ny = 0.5; snapH?.classList.add('show'); } else { snapH?.classList.remove('show'); }

    S.customizations[S.activeSlide].dragX = nx;
    S.customizations[S.activeSlide].dragY = ny;
    renderCanvas();
    e.preventDefault();
  }

  function onEnd() {
    if(!dragging) return;
    dragging = false;
    canvas.classList.remove('dragging');
    document.getElementById('snap-h')?.classList.remove('show');
    document.getElementById('snap-v')?.classList.remove('show');
  }

  canvas.addEventListener('mousedown',  onStart, {passive:false});
  canvas.addEventListener('touchstart', onStart, {passive:false});
  window.addEventListener('mousemove',  onMove,  {passive:false});
  window.addEventListener('touchmove',  onMove,  {passive:false});
  window.addEventListener('mouseup',    onEnd);
  window.addEventListener('touchend',   onEnd);
}

// Word highlight — new persistent-panel model
function hlWord(clean) {
  const wf = S.customizations[S.activeSlide].wordFormats;
  const existing = wf[clean];
  // Remove if already has same colour AND same caps state; otherwise apply/update
  if(existing && existing.color===S.hlColor && !!existing.caps===S.hlCaps) {
    delete wf[clean];
  } else {
    wf[clean] = {color: S.hlColor, weight: 700, caps: S.hlCaps};
  }
  // Re-render only the word zone + canvas, not the whole panel
  _refreshWordZone();
  renderCanvas();
}
function setHlColor(color) {
  S.hlColor = color;
  document.querySelectorAll('.swatch').forEach(s=>{
    s.classList.toggle('active', s.dataset.color===color);
  });
  document.querySelectorAll('.hl-custom-input').forEach(el=>el.value=color);
}
function toggleHlCaps() {
  S.hlCaps = !S.hlCaps;
  const btn = document.getElementById('btn-caps-toggle');
  if(btn){
    btn.classList.toggle('selected', S.hlCaps);
    btn.title = S.hlCaps ? 'Caps ON — click to turn off' : 'Toggle ALL CAPS for highlighted words';
  }
}
function clearAllHighlights() {
  S.customizations[S.activeSlide].wordFormats = {};
  _refreshWordZone();
  renderCanvas();
}
function _refreshWordZone() {
  // Re-render just the word zone tokens without full panel rebuild
  const zone = document.getElementById('hl-word-zone');
  if(!zone) return;
  zone.innerHTML = _buildWordZoneHtml();
}
function _buildWordZoneHtml() {
  const custom = S.customizations[S.activeSlide];
  const rawWords = ((custom.headline||'')+' '+(custom.body||'')).split(/\s+/).filter(Boolean);
  const seen = new Set();
  return rawWords.map(w=>{
    const clean = w.replace(/[^a-zA-Z0-9']/g,'').toLowerCase();
    if(!clean||seen.has(clean)) return '';
    seen.add(clean);
    const fmt = custom.wordFormats[clean];
    const style = fmt ? `color:${fmt.color};font-weight:${fmt.weight||700};${fmt.caps?'text-transform:uppercase;letter-spacing:.05em;':''}` : '';
    const display = fmt?.caps ? w.toUpperCase() : esc(w);
    return `<span class="hltoken${fmt?' is-hl':''}" style="${style}" onclick="hlWord('${escAttr(clean)}')">${display}</span> `;
  }).join('');
}
async function autoHighlight() {
  const btn = document.getElementById('btn-auto-hl');
  if(btn){btn.disabled=true;btn.textContent='Analysing…';}
  const custom = S.customizations[S.activeSlide];
  const text = (custom.headline||'')+' '+(custom.body||'');
  try {
    const res = await apiFetch('/api/highlight', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text, color: S.hlColor})
    });
    const {words} = await res.json();
    if(Array.isArray(words)) {
      words.forEach(w=>{
        const clean = w.replace(/[^a-zA-Z0-9']/g,'').toLowerCase();
        if(clean) custom.wordFormats[clean]={color:S.hlColor, weight:700, caps:S.hlCaps};
      });
    }
    _refreshWordZone();
    renderCanvas();
  } catch(e){ alert('Auto-highlight failed: '+e.message); }
  finally { if(btn){btn.disabled=false;btn.textContent='✦ Auto-Highlight Keywords';} }
}
// Legacy — keep so nothing breaks
function selectWord(clean) { hlWord(clean); }

// LANGUAGE / TRANSLATE
// ═══════════════════════════════════════════════════════════════
async function setLanguage(lang) {
  if(lang === S.language) return;
  if(lang === 'English') { restoreOriginal(); return; }

  // Back up originals before first translation
  if(!S.originalCustomizations) {
    S.originalCustomizations = S.customizations.map(c=>JSON.parse(JSON.stringify(c)));
  }

  const spinner = document.getElementById('translate-spinner');
  const sel = document.getElementById('lang-select');
  if(spinner) spinner.style.display='block';
  if(sel) sel.disabled=true;

  try {
    // Build plain slide objects from current (English) originals
    const source = S.originalCustomizations.map((c,i)=>({
      type: S.slides[i]?.type||'value',
      headline: c.headline,
      body: c.body,
      direction: S.slides[i]?.direction||''
    }));
    const res = await apiFetch('/api/translate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({slides: source, language: lang, niche: getNicheLabel()})
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    data.slides.forEach((sl,i)=>{
      if(S.customizations[i]) {
        S.customizations[i].headline = sl.headline||S.customizations[i].headline;
        S.customizations[i].body = sl.body||S.customizations[i].body;
      }
    });
    S.language = lang;
    render();
  } catch(e) {
    showToast('Translation failed: '+e.message);
    if(sel){ sel.value = S.language; sel.disabled=false; }
    if(spinner) spinner.style.display='none';
  }
}

function restoreOriginal() {
  if(!S.originalCustomizations) return;
  S.customizations = S.originalCustomizations.map(c=>JSON.parse(JSON.stringify(c)));
  S.originalCustomizations = null;
  S.language = 'English';
  render();
}

  try {
    const res = await apiFetch('/api/voice', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    saveVoiceProfile(data.profile);
    S.useVoice = true;
    openVoiceModal(); // Rebuild with profile shown
    _updateVoiceHeaderBtn();
  } catch(e) {
    if(analysing) analysing.style.display='none';
    document.querySelectorAll('.voice-pane').forEach(p=>p.style.display='');
    if(errEl){errEl.textContent=e.message;errEl.classList.add('show');}
  }
}

async function analyseVoiceQuestions() {
  const q1 = document.getElementById('vq1')?.value.trim()||'';
  const q2 = document.getElementById('vq2')?.value.trim()||'';
  const q3 = document.getElementById('vq3')?.value.trim()||'';
  if(!q1&&!q2&&!q3){
    const e=document.getElementById('voice-err-q');
    if(e){e.textContent='Answer at least one question.';e.classList.add('show');}
    return;
  }
  const text = `Q1 — What I do and who I help:\n${q1}\n\nQ2 — My hot take:\n${q2}\n\nQ3 — Things I always say:\n${q3}`;
  await _sendForVoiceAnalysis(text, 'voice-err-q');
}

async function analyseVoicePaste() {
  const text = document.getElementById('vpaste')?.value.trim()||'';
  if(!text){
    const e=document.getElementById('voice-err-p');
    if(e){e.textContent='Please paste some text first.';e.classList.add('show');}
    return;
  }
  await _sendForVoiceAnalysis(text, 'voice-err-p');
}

async function analyseVoiceTranscript() {
  if(!_transcript){
    const e=document.getElementById('voice-err-r');
    if(e){e.textContent='No transcript yet — record first.';e.classList.add('show');}
    return;
  }
  await _sendForVoiceAnalysis(_transcript, 'voice-err-r');
}

function toggleRecording() {
  if(_isRecording) { stopRecording(); return; }
  startRecording();
}

function startRecording() {
  _transcript = '';
  const transcriptEl = document.getElementById('voice-transcript');
  const btn = document.getElementById('btn-record');
  const lbl = document.getElementById('record-label');
  const analyseBtn = document.getElementById('btn-analyse-record');

  // Try Web Speech API first
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(SR) {
    _recognition = new SR();
    _recognition.continuous = true;
    _recognition.interimResults = true;
    _recognition.lang = 'en-US';
    _recognition.onresult = (e) => {
      let interim='', final='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) final+=e.results[i][0].transcript+' ';
        else interim+=e.results[i][0].transcript;
      }
      _transcript = (_transcript+final).trim();
      if(transcriptEl){ transcriptEl.style.display='block'; transcriptEl.textContent=_transcript+(interim?' …'+interim:''); }
    };
    _recognition.onerror = (e) => {
      const errEl = document.getElementById('voice-err-r');
      if(errEl){errEl.textContent='Mic error: '+e.error;errEl.classList.add('show');}
      stopRecording();
    };
    _recognition.onend = () => { if(_isRecording) _recognition.start(); }; // Keep going until stopped
    _recognition.start();
    _isRecording = true;
    if(btn) btn.classList.add('recording');
    if(lbl) lbl.textContent='Stop Recording';
  } else {
    // Fallback: just show a textarea for manual entry
    const errEl = document.getElementById('voice-err-r');
    if(transcriptEl){
      transcriptEl.style.display='block';
      transcriptEl.contentEditable='true';
      transcriptEl.textContent='Speech recognition not supported in this browser. Type your transcript here…';
    }
    if(errEl){errEl.textContent='Microphone transcription not supported — type directly in the box above.';errEl.classList.add('show');}
    if(analyseBtn) analyseBtn.style.display='block';
  }
}

function stopRecording() {
  _isRecording = false;
  if(_recognition){ _recognition.onend=null; _recognition.stop(); _recognition=null; }
  const btn = document.getElementById('btn-record');
  const lbl = document.getElementById('record-label');
  const analyseBtn = document.getElementById('btn-analyse-record');
  const transcriptEl = document.getElementById('voice-transcript');
  if(btn) btn.classList.remove('recording');
  if(lbl) lbl.textContent='Start Recording';
  if(_transcript && analyseBtn) analyseBtn.style.display='block';
  // Allow manual editing of transcript
  if(transcriptEl && _transcript) {
    transcriptEl.contentEditable='true';
    transcriptEl.oninput=()=>{ _transcript=transcriptEl.textContent||''; };
  }
}

// ═══════════════════════════════════════════════════════════════
// CANVAS RENDERING
// ═══════════════════════════════════════════════════════════════
const EXPORT_W=1080, EXPORT_H=1920;

async function renderCanvas(forExport=false, slideIdx=null) {
  const idx = slideIdx!==null ? slideIdx : S.activeSlide;
  const canvas = forExport ? document.createElement('canvas') : document.getElementById('previewCanvas');
  if(!canvas) return null;

  const W = forExport ? EXPORT_W : 360;
  const H = forExport ? EXPORT_H : 640;
  canvas.width=W; canvas.height=H;

  const ctx=canvas.getContext('2d');
  const custom=S.customizations[idx];
  if(!custom) return null;

  const SF = W/EXPORT_W; // scale factor: 1 for export, ~0.333 for preview

  // 1. Black base
  ctx.fillStyle='#111111';
  ctx.fillRect(0,0,W,H);

  // 2. Background image/video (cover-fit)
  if(S.bgEl) {
    try {
      const iW=S.bgIsVideo?S.bgEl.videoWidth:S.bgEl.naturalWidth;
      const iH=S.bgIsVideo?S.bgEl.videoHeight:S.bgEl.naturalHeight;
      if(iW>0&&iH>0){
        const sc=Math.max(W/iW,H/iH);
        ctx.drawImage(S.bgEl,(W-iW*sc)/2,(H-iH*sc)/2,iW*sc,iH*sc);
      }
    } catch(e){}
  }

  // 3. Gradient overlay (opacity-controlled)
  const op=Math.max(0,Math.min(1,custom.overlayOpacity??0.62));
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,`rgba(0,0,0,${Math.min(op+0.12,1)})`);
  grad.addColorStop(0.45,`rgba(0,0,0,${Math.max(op-0.08,0)})`);
  grad.addColorStop(1,`rgba(0,0,0,${Math.min(op+0.18,1)})`);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // 4. Text layout
  const padX=W*0.09;
  const fontFam=FONTS.find(f=>f.id===custom.font)?.css||"'Space Grotesk',sans-serif";
  const tScale=custom.textScale||1.0;
  const headSize=Math.round(custom.headlineSize*SF*tScale);
  const bodySize=Math.round(custom.bodySize*SF*tScale);
  const lhMult=custom.lineHeight||1.2;
  const lineH=headSize*lhMult;
  const bodyLineH=bodySize*lhMult;
  const maxW=W-padX*2;
  const shadow=custom.textShadow!==false;

  ctx.font=`${custom.headlineWeight} ${headSize}px ${fontFam}`;
  const headLines=wrapText(ctx,custom.headline||'',maxW);
  ctx.font=`${custom.bodyWeight} ${bodySize}px ${fontFam}`;
  const bodyLines=wrapText(ctx,custom.body||'',maxW);

  const sepH=Math.round(30*SF);
  const totalH=headLines.length*lineH+sepH+bodyLines.length*bodyLineH;

  // Determine text block origin — drag position overrides preset
  let startY, textPadX;
  if(custom.dragY !== null && custom.dragY !== undefined) {
    // dragY is fraction of canvas H representing the *centre* of the text block
    startY = custom.dragY * H - totalH / 2;
    startY = Math.max(0, Math.min(H - totalH, startY));
  } else {
    if(custom.position==='top') startY=H*0.1;
    else if(custom.position==='bottom') startY=H-totalH-H*0.1;
    else startY=(H-totalH)/2;
  }
  if(custom.dragX !== null && custom.dragX !== undefined) {
    textPadX = custom.dragX * W;
    textPadX = Math.max(padX*0.5, Math.min(W - padX*0.5, textPadX));
  } else {
    textPadX = padX;
  }
  const textMaxW = W - textPadX - padX;

  // 5. Headline
  let curY=drawTextLines(ctx,headLines,custom.wordFormats,startY,textPadX,textMaxW,W,
    custom.headlineColor||'#F5F0E8',custom.headlineWeight||800,
    headSize,fontFam,lineH,custom.headlineAlign||'left',shadow);

  // 6. Separator bar
  ctx.fillStyle='#FF6B00';
  ctx.fillRect(textPadX,curY+Math.round(8*SF),Math.round(70*SF),Math.round(3*SF));
  curY+=sepH;

  // 7. Body
  drawTextLines(ctx,bodyLines,custom.wordFormats,curY,textPadX,textMaxW,W,
    custom.bodyColor||'#C8C0B0',custom.bodyWeight||400,
    bodySize,fontFam,bodyLineH,custom.bodyAlign||'left',shadow);

  // No type label. No branding footer.
  return canvas;
}

// Render lines of text with per-word colour/weight overrides
function drawTextLines(ctx,lines,wordFormats,startY,padX,maxW,W,defaultColor,defaultWeight,fontSize,fontFam,lineH,align,shadow) {
  let curY=startY;
  if(shadow){ctx.shadowColor='rgba(0,0,0,0.85)';ctx.shadowBlur=14;ctx.shadowOffsetX=1;ctx.shadowOffsetY=2;}
  for(const line of lines){
    const words=line.split(' ');
    let startX=padX;
    if(align!=='left'){
      // Accurate per-word measurement accounting for individual weights and caps
      let lw=0;
      for(let wi=0;wi<words.length;wi++){
        const wclean=words[wi].replace(/[^a-zA-Z0-9']/g,'').toLowerCase();
        const wfmt=wordFormats?.[wclean]||{};
        const wdrawn=wfmt.caps?words[wi].toUpperCase():words[wi];
        ctx.font=`${wfmt.weight||defaultWeight} ${fontSize}px ${fontFam}`;
        lw+=ctx.measureText(wdrawn).width;
        if(wi<words.length-1){ctx.font=`${defaultWeight} ${fontSize}px ${fontFam}`;lw+=ctx.measureText(' ').width;}
      }
      startX=align==='center'?(W-lw)/2:W-padX-lw;
    }
    let curX=startX;
    for(let wi=0;wi<words.length;wi++){
      const word=words[wi];
      const clean=word.replace(/[^a-zA-Z0-9']/g,'').toLowerCase();
      const fmt=wordFormats?.[clean]||{};
      const weight=fmt.weight||defaultWeight;
      const color=fmt.color||defaultColor;
      const drawn=fmt.caps ? word.toUpperCase() : word;
      ctx.font=`${weight} ${fontSize}px ${fontFam}`;
      ctx.fillStyle=color;
      ctx.fillText(drawn,curX,curY+fontSize);
      const wordW=ctx.measureText(drawn).width;
      if(wi<words.length-1){ctx.font=`${defaultWeight} ${fontSize}px ${fontFam}`;curX+=wordW+ctx.measureText(' ').width;}
      else curX+=wordW;
    }
    curY+=lineH;
  }
  ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
  return curY;
}

function wrapText(ctx,text,maxWidth){
  const words=(text||'').split(' ');
  const lines=[];let line='';
  for(const word of words){
    const test=line?line+' '+word:word;
    if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=word;}
    else line=test;
  }
  if(line)lines.push(line);
  return lines;
}

// ═══════════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════════
async function downloadSlide(idx) {
  await document.fonts.ready;
  const canvas=await renderCanvas(true,idx);
  if(!canvas) return;
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download=`${S.topicSlug}-${idx+1}.png`;
  a.click();
}

async function downloadAll() {
  await document.fonts.ready;
  const btn=document.querySelector('.btn-dl-all');
  if(btn){btn.disabled=true;btn.textContent='⏳ Rendering…';}
  try {
    const zip=new JSZip();
    const folder=zip.folder(S.topicSlug);
    for(let i=0;i<S.slides.length;i++){
      const canvas=await renderCanvas(true,i);
      if(!canvas) continue;
      folder.file(`${S.topicSlug}-${i+1}.png`,canvas.toDataURL('image/png').split(',')[1],{base64:true});
    }
    const blob=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`${S.topicSlug}-slides.zip`;
    a.click();
  } finally {
    if(btn){btn.disabled=false;btn.textContent=`⬇ Download All (${S.slides.length})`;}
  }
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s){return String(s||'').replace(/'/g,"\\'");}

(async function boot() {
  await fetchClientsCatalog();
  const stored = loadStoredClient();
  if (stored) {
    S.client = stored;
    S.niche = 'client';
    S.length = stored.default_length || S.length;
    S.language = stored.default_language || S.language;
    if (S.step === 1) S.step = 2;
  }
  _updateClientHeader();
  render();
  setTimeout(_updateVoiceHeaderBtn, 0);
})();
